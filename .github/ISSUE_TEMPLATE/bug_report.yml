name: Bug report
description: Something is broken or behaves unexpectedly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting. Please include reproduction steps."
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations: { required: true }
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations: { required: true }
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal commands/code to reproduce
      render: shell
    validations: { required: true }
  - type: input
    id: version
    attributes:
      label: Version / commit SHA
    validations: { required: false }
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, language version, relevant config
    validations: { required: false }
