name: Feature request
description: Propose a new capability or enhancement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this solve?
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How should it work? (design, API, UX)
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, specs, external references
