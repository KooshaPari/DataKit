version: "3"

vars:
  ROOT_DIR:
    sh: git rev-parse --show-toplevel
  PYTHON_MANIFESTS_CMD: >-
    find . -path './.git' -prune
    -o -path '*/.venv' -prune
    -o -path '*/node_modules' -prune
    -o -path '*/target' -prune
    -o -name pyproject.toml -print | sort
  RUST_MANIFESTS_CMD: >-
    find rust -path '*/target' -prune
    -o -name Cargo.toml -print | sort
  GO_WORKSPACE_CMD: >-
    find go -maxdepth 2 \( -name go.work -o -name go.mod \) -print -quit
  GO_SOURCES_CMD: >-
    find go -type f -name '*.go' -print -quit

tasks:
  default:
    desc: Run build, test, and lint
    deps:
      - build
      - test
      - lint

  build:
    desc: Build detected language targets
    silent: true
    cmds:
      - cmd: |
          set -eu
          cd "{{.ROOT_DIR}}"

          python_manifests=$({{.PYTHON_MANIFESTS_CMD}})
          if [ -n "$python_manifests" ]; then
            echo "==> python: build"
            printf '%s\n' "$python_manifests" | while IFS= read -r manifest; do
              [ -n "$manifest" ] || continue
              project_dir=$(dirname "$manifest")
              echo "---- $project_dir"
              (
                cd "$project_dir"
                if command -v uv >/dev/null 2>&1; then
                  uv build
                else
                  python -m build
                fi
              )
            done
          else
            echo "==> python: skipped"
          fi

          rust_manifests=$({{.RUST_MANIFESTS_CMD}})
          if [ -n "$rust_manifests" ]; then
            echo "==> rust: build"
            (cd rust && cargo build --workspace)
          else
            echo "==> rust: skipped"
          fi

          if [ -n "$({{.GO_WORKSPACE_CMD}})" ] && [ -n "$({{.GO_SOURCES_CMD}})" ]; then
            echo "==> go: build"
            (cd go && go build ./...)
          else
            echo "==> go: skipped"
          fi

  test:
    desc: Run detected language test suites
    silent: true
    cmds:
      - cmd: |
          set -eu
          cd "{{.ROOT_DIR}}"

          python_manifests=$({{.PYTHON_MANIFESTS_CMD}})
          if [ -n "$python_manifests" ] && [ -d tests ] && find tests -type f -name 'test_*.py' -print -quit | grep -q .; then
            echo "==> python: test"
            primary_python_project=$(printf '%s\n' "$python_manifests" | head -n 1 | xargs dirname)
            echo "---- tests"
            (
              cd "$primary_python_project"
              if command -v uv >/dev/null 2>&1; then
                PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. uv run pytest ../../tests
              else
                PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. pytest ../../tests
              fi
            )
          else
            echo "==> python: skipped"
          fi

          rust_manifests=$({{.RUST_MANIFESTS_CMD}})
          if [ -n "$rust_manifests" ]; then
            echo "==> rust: test"
            (cd rust && cargo test --workspace)
          else
            echo "==> rust: skipped"
          fi

          if [ -n "$({{.GO_WORKSPACE_CMD}})" ] && [ -n "$({{.GO_SOURCES_CMD}})" ]; then
            echo "==> go: test"
            (cd go && go test ./...)
          else
            echo "==> go: skipped"
          fi

  lint:
    desc: Run detected language lint and formatting checks
    silent: true
    cmds:
      - cmd: |
          set -eu
          cd "{{.ROOT_DIR}}"

          python_manifests=$({{.PYTHON_MANIFESTS_CMD}})
          if [ -n "$python_manifests" ]; then
            echo "==> python: lint"
            printf '%s\n' "$python_manifests" | while IFS= read -r manifest; do
              [ -n "$manifest" ] || continue
              project_dir=$(dirname "$manifest")
              echo "---- $project_dir"
              (
                cd "$project_dir"
                if command -v uv >/dev/null 2>&1; then
                  uv run ruff check . --select E4,E7,E9,F,I
                else
                  ruff check . --select E4,E7,E9,F,I
                fi
              )
            done
          else
            echo "==> python: skipped"
          fi

          rust_manifests=$({{.RUST_MANIFESTS_CMD}})
          if [ -n "$rust_manifests" ]; then
            echo "==> rust: lint"
            (
              cd rust
              cargo fmt --check
              cargo clippy --workspace --all-targets -- -D warnings
            )
          else
            echo "==> rust: skipped"
          fi

          if [ -n "$({{.GO_WORKSPACE_CMD}})" ] && [ -n "$({{.GO_SOURCES_CMD}})" ]; then
            echo "==> go: lint"
            (
              cd go
              unformatted=$(gofmt -l .)
              if [ -n "$unformatted" ]; then
                echo "$unformatted"
                exit 1
              fi
              go vet ./...
            )
          else
            echo "==> go: skipped"
          fi

  clean:
    desc: Remove generated build and cache artifacts
    silent: true
    cmds:
      - cmd: |
          set -eu
          cd "{{.ROOT_DIR}}"

          python_manifests=$({{.PYTHON_MANIFESTS_CMD}})
          if [ -n "$python_manifests" ]; then
            echo "==> python: clean"
            find . \( -path '*/build' -o -path '*/dist' -o -path '*/.pytest_cache' -o -path '*/.mypy_cache' -o -path '*/.ruff_cache' -o -path '*/__pycache__' -o -path '*/*.egg-info' \) -type d -prune -exec sh -c '
              for path do
                if git ls-files -- "$path" | grep -q .; then
                  echo "preserve tracked $path"
                else
                  rm -rf "$path"
                fi
              done
            ' sh {} +
            find . -type f \( -name '*.pyc' -o -name uv.lock \) -exec sh -c '
              for path do
                if git ls-files --error-unmatch "$path" >/dev/null 2>&1; then
                  echo "preserve tracked $path"
                else
                  rm -f "$path"
                fi
              done
            ' sh {} +
          else
            echo "==> python: skipped"
          fi

          rust_manifests=$({{.RUST_MANIFESTS_CMD}})
          if [ -n "$rust_manifests" ]; then
            echo "==> rust: clean"
            (cd rust && cargo clean)
          else
            echo "==> rust: skipped"
          fi

          if [ -n "$({{.GO_WORKSPACE_CMD}})" ] && [ -n "$({{.GO_SOURCES_CMD}})" ]; then
            echo "==> go: clean"
            (cd go && go clean -cache -testcache)
          else
            echo "==> go: skipped"
          fi
